<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> IIT Madras-Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#76b1e2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login-box{
    background:#fff;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}
h2  
{
    text-align:center;
    color:#8B0000; } 

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    width:100%;
    padding:10px;
    background:#4A90E2;
    color:white;
    border:none;
    cursor:pointer;
}
</style>

<script>
function login() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    // Change these to your own username and password
    if (username === "admin" && password === "sarathy") {
        window.location.href = "index.html";
    } else {
        alert("Invalid username or password!");
    }
}
</script>

</head>
<body>

<div class="login-box">
    <h2>IIT Madras</h2>
    <h3 style="text-align:center;">Student Login</h3>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

</body>
</html>
