<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIT Madras - Student Physiotherapy Information System</title>


<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
}
header{
    background:#8B0000;
    color:white;
    padding:20px;
    text-align:center;
}
.container{
    width:80%;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
}
button{
    background:#8B0000;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    border-radius:5px;
}
button:hover{
    background:#a30000;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
table,th,td{
    border:1px solid #ccc;
}
th,td{
    padding:10px;
    text-align:left;
}
</style>
</head>

<body>

<header>
<h1>IIT Madras</h1>
<h2>Student & Physiotherapist Treatment Information System</h2>
</header>

<div class="container">

<h3>Student Details</h3>

<label>Student Name</label>
<input type="text" id="name">

<label>Roll Number</label>
<input type="text" id="roll">

<label>Department</label>
<input type="text" id="dept">

<label>Age</label>
<input type="number" id="age">

<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<h3>Physiotherapy Treatment</h3>

<label>Diagnosis</label>
<input type="text" id="diagnosis">

<label>Treatment Given</label>
<textarea id="treatment"></textarea>

<label>Physiotherapist Name</label>
<input type="text" id="physio">

<label>Date</label>
<input type="date" id="date">

<h3>Data Entry Operator</h3>

<label>Operator Name</label>
<input type="text" id="operator">

<button onclick="saveData()">Save Record</button>

<h3>Saved Records</h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>Roll No</th>
<th>Department</th>
<th>Diagnosis</th>
<th>Treatment</th>
<th>Physiotherapist</th>
<th>Operator</th>
</tr>
</thead>
<tbody id="records"></tbody>
</table>

</div>

<script>

function loadData(){
let records=JSON.parse(localStorage.getItem("iitRecords"))||[];
let table=document.getElementById("records");
table.innerHTML="";

records.forEach(r=>{
table.innerHTML+=`
<tr>
<td>${r.name}</td>
<td>${r.roll}</td>
<td>${r.dept}</td>
<td>${r.diagnosis}</td>
<td>${r.treatment}</td>
<td>${r.physio}</td>
<td>${r.operator}</td>
</tr>`;
});
}

function saveData(){

let record={
name:document.getElementById("name").value,
roll:document.getElementById("roll").value,
dept:document.getElementById("dept").value,
age:document.getElementById("age").value,
gender:document.getElementById("gender").value,
diagnosis:document.getElementById("diagnosis").value,
treatment:document.getElementById("treatment").value,
physio:document.getElementById("physio").value,
date:document.getElementById("date").value,
operator:document.getElementById("operator").value
};

let records=JSON.parse(localStorage.getItem("iitRecords"))||[];
records.push(record);

localStorage.setItem("iitRecords",JSON.stringify(records));

alert("Record Saved Successfully");

loadData();

document.querySelectorAll("input, textarea").forEach(i=>i.value="");
}

loadData();

</script>

</body>
</html>
